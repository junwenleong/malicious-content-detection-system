[pytest]
# Pytest configuration for pre-commit and CI/CD

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    slow: marks tests as slow (> 1 second) - skipped in pre-commit
    integration: marks tests as integration tests - skipped in pre-commit
    unit: marks tests as fast unit tests (< 1 second) - run in pre-commit

# Output options
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options (when using --cov)
[coverage:run]
source = src,api
omit =
    */tests/*
    */conftest.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
