# Pre-commit hooks configuration
# Philosophy: Fast filter (< 5 seconds) that catches 90% of mistakes
# Heavy checks (full tests, builds) run in CI/CD or pre-push
# See https://pre-commit.com for more information

repos:
  # Universal checks (fast hygiene)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^docker-compose\.dev\.yml$
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict

  # Security: TruffleHog (replaces detect-private-key and detect-secrets)
  # Faster and more comprehensive secret detection
  - repo: local
    hooks:
      - id: trufflehog-git
        name: TruffleHog (secret detection)
        entry: trufflehog git file://. --since-commit HEAD --only-verified --fail
        language: system
        pass_filenames: false

  # Python: Ruff (replaces Flake8, isort, Black - 100x faster)
  # Check-only: ship.sh runs ruff --fix before committing, so no auto-fix needed here
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--ignore, E741]
      - id: ruff-format
        name: ruff (format check)
        args: [--check]

  # Python: Mypy (type checking - full project for consistency)
  - repo: local
    hooks:
      - id: mypy
        name: mypy (type check)
        entry: mypy src/ api/
        language: system
        types: [python]
        files: ^(src|api)/
        args: []
        pass_filenames: false

  # Frontend: Prettier (check-only: ship.sh runs prettier --write before committing)
  - repo: local
    hooks:
      - id: prettier
        name: prettier (format check)
        entry: bash -c 'cd frontend && npx prettier --check "**/*.{js,jsx,ts,tsx,json,css,md}" --ignore-unknown'
        language: system
        files: \.(js|jsx|ts|tsx|json|css|md)$
        exclude: ^(package-lock\.json|.*\.min\.(js|css))$
        pass_filenames: false

  # Frontend: ESLint (logic errors only, not formatting)
  - repo: local
    hooks:
      - id: eslint
        name: eslint (lint)
        entry: bash -c 'cd frontend && npm run lint -- --max-warnings=0'
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false

  # Frontend: TypeScript (type check - only on changed files)
  - repo: local
    hooks:
      - id: tsc
        name: tsc (type check)
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
