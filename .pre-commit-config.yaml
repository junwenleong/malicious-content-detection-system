# Pre-commit hooks configuration
# Philosophy: Fast filter (< 5 seconds) that catches 90% of mistakes
# Heavy checks (full tests, builds) run in CI/CD or pre-push
# See https://pre-commit.com for more information

repos:
  # Universal checks (fast hygiene)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^docker-compose\.dev\.yml$
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict

  # Security: TruffleHog (replaces detect-private-key and detect-secrets)
  # Faster and more comprehensive secret detection
  - repo: local
    hooks:
      - id: trufflehog-git
        name: TruffleHog (secret detection)
        entry: trufflehog git file://. --since-commit HEAD --only-verified --fail
        language: system
        pass_filenames: false

  # Python: Ruff (replaces Flake8, isort, Black - 100x faster)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ruff (lint + auto-fix)
        args: [--fix, --ignore, E741]
      - id: ruff-format
        name: ruff (format)

  # Python: Mypy (type checking - full project for consistency)
  - repo: local
    hooks:
      - id: mypy
        name: mypy (type check)
        entry: mypy src/ api/
        language: system
        types: [python]
        files: ^(src|api)/
        args: []
        pass_filenames: false

  # Frontend: Prettier (auto-format - faster than ESLint for formatting)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: prettier (format)
        files: \.(js|jsx|ts|tsx|json|css|md)$
        exclude: ^(package-lock\.json|.*\.min\.(js|css))$

  # Frontend: ESLint (logic errors only, not formatting)
  - repo: local
    hooks:
      - id: eslint
        name: eslint (lint)
        entry: bash -c 'cd frontend && npm run lint -- --max-warnings=0'
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false

  # Frontend: TypeScript (type check - only on changed files)
  - repo: local
    hooks:
      - id: tsc
        name: tsc (type check)
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

  # Python: Fast unit tests (< 2 seconds, critical paths only)
  # Full test suite runs in CI/CD and ship.sh
  # DISABLED: Pre-commit environment doesn't have venv activated
  # Tests run in ship.sh before commit, so this is redundant
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast unit tests)
        entry: pytest
        language: system
        types: [python]
        args: [-m, "not slow and not integration", --tb=short, -q]
        pass_filenames: false
        verbose: true
        stages: [manual]  # Only run if explicitly triggered
