services:
  backend:
    image: malicious-content-detection:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Production overrides - MUST be provided via secrets management
      ALLOWED_ORIGINS: '["https://internal-tool.corp.com"]'
      WORKERS: "4"
      # Secrets must be provided by environment/orchestrator
      # API_KEY: ...
      # HMAC_SECRET: ... (if HMAC_ENABLED=true)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: malicious-content-detection-frontend:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
