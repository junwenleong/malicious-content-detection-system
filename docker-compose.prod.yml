networks:
  internal:
    driver: bridge
    internal: true   # backend not reachable from host directly
  public:
    driver: bridge

services:
  backend:
    image: malicious-content-detection:latest
    restart: always
    networks:
      - internal
    # Port 8000 is NOT exposed externally in production.
    # Route traffic through a reverse proxy (NGINX) on port 80/443.
    expose:
      - "8000"
    environment:
      # Production overrides - MUST be provided via secrets management
      ALLOWED_ORIGINS: '["https://internal-tool.corp.com"]'
      WORKERS: "4"
      # Secrets must be provided by environment/orchestrator
      # API_KEY: ...
      # HMAC_SECRET: ... (if HMAC_ENABLED=true)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: malicious-content-detection-frontend:latest
    restart: always
    networks:
      - internal
      - public
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    healthcheck:
      # Use curl (available in nginx images) instead of wget
      test: ["CMD", "curl", "-f", "--silent", "--max-time", "3", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
